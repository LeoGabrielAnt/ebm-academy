<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520"><defs><style>.bg{fill:#0f172a}.t{font:700 28px Arial;fill:#e2e8f0}.s{font:400 16px Arial;fill:#cbd5e1}.r{fill:#3f1d2e;stroke:#f87171;stroke-width:3}.y{fill:#422006;stroke:#fbbf24;stroke-width:3}.g{fill:#052e16;stroke:#34d399;stroke-width:3}.h{font:700 22px Arial;fill:#fff}.p{font:400 16px Arial;fill:#e5e7eb}.line{stroke:#94a3b8;stroke-width:4;fill:none;marker-end:url(#a)}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs><rect class="bg" width="1200" height="520"/>
<text x="40" y="45" class="t">Camadas de alarme e resposta operacional</text><text x="40" y="72" class="s">Nem todo alarme é igual: alguns pedem observação; outros exigem ação imediata</text>
<rect x="90" y="155" width="280" height="210" rx="18" class="g"/><text x="230" y="200" text-anchor="middle" class="h">Alerta</text><text x="230" y="232" text-anchor="middle" class="p">desvio leve ou tendência</text><text x="120" y="275" class="p">• vibração subindo</text><text x="120" y="302" class="p">• DP fora do ideal</text><text x="120" y="329" class="p">• sensor com ruído</text>
<rect x="460" y="155" width="280" height="210" rx="18" class="y"/><text x="600" y="200" text-anchor="middle" class="h">Alarme</text><text x="600" y="232" text-anchor="middle" class="p">requere intervenção organizada</text><text x="490" y="275" class="p">• bomba falhada</text><text x="490" y="302" class="p">• falha de comunicação</text><text x="490" y="329" class="p">• falta de fluxo</text>
<rect x="830" y="155" width="280" height="210" rx="18" class="r"/><text x="970" y="200" text-anchor="middle" class="h">Crítico</text><text x="970" y="232" text-anchor="middle" class="p">pode impactar carga crítica</text><text x="860" y="275" class="p">• sem bomba disponível</text><text x="860" y="302" class="p">• múltiplos sensores inválidos</text><text x="860" y="329" class="p">• chiller indisponível sem reserva</text>
<path class="line" d="M370 260 H458"/><path class="line" d="M740 260 H828"/>
</svg>